AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Static Website Infrastructure - S3 + Route 53 + CloudWatch
  Author: [O teu nome]
  Version: 1.0

# ─────────────────────────────────────────────
# PARAMETERS — valores que podes mudar ao fazer deploy
# ─────────────────────────────────────────────
Parameters:

  DomainName:
    Type: String
    Description: O teu dominio registado no Route 53 (ex: meusite.com)
    Default: meusite.com

  ProjectName:
    Type: String
    Description: Nome do projecto (usado para naming dos recursos)
    Default: static-website

  AlarmEmail:
    Type: String
    Description: Email para receber alertas do CloudWatch
    Default: teu@email.com

# ─────────────────────────────────────────────
# RESOURCES
# ─────────────────────────────────────────────
Resources:

  # ── 1. S3 BUCKET — armazena os ficheiros do site ──────────────────────────
  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-${AWS::AccountId}"
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: error.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: ManagedBy
          Value: CloudFormation

  # ── 2. BUCKET POLICY — permite leitura pública dos ficheiros ──────────────
  WebsiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: PublicReadGetObject
            Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub "${WebsiteBucket.Arn}/*"

  # ── 3. SNS TOPIC — para notificacoes do CloudWatch ────────────────────────
  AlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "${ProjectName}-alerts"
      Subscription:
        - Protocol: email
          Endpoint: !Ref AlarmEmail
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # ── 4. CLOUDWATCH ALARM — alerta se o bucket tiver erros de acesso ────────
  S3ErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${ProjectName}-4xx-errors"
      AlarmDescription: >
        Alerta quando ha pedidos com erro 4xx ao bucket S3
      Namespace: AWS/S3
      MetricName: 4xxErrors
      Dimensions:
        - Name: BucketName
          Value: !Ref WebsiteBucket
        - Name: FilterId
          Value: EntireBucket
      Statistic: Sum
      Period: 300          # 5 minutos
      EvaluationPeriods: 1
      Threshold: 10        # mais de 10 erros em 5 minutos
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlarmTopic
      TreatMissingData: notBreaching

  # ── 5. ROUTE 53 HOSTED ZONE — zona DNS para o teu dominio ─────────────────
  HostedZone:
    Type: AWS::Route53::HostedZone
    Properties:
      Name: !Ref DomainName
      HostedZoneConfig:
        Comment: !Sub "Hosted zone para ${DomainName} - gerida por CloudFormation"

  # ── 6. ROUTE 53 RECORD — aponta o dominio para o bucket S3 ────────────────
  WebsiteDNSRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZone
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !Sub "s3-website-${AWS::Region}.amazonaws.com"
        HostedZoneId: Z3AQBSTGFYJSTF   # Hosted Zone ID do S3 website (us-east-1)
        EvaluateTargetHealth: false

  # ── 7. IAM ROLE — permissoes minimas para gerir o bucket (least privilege) ─
  DeploymentRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-deploy-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3DeployPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt WebsiteBucket.Arn
                  - !Sub "${WebsiteBucket.Arn}/*"
      Tags:
        - Key: Project
          Value: !Ref ProjectName

# ─────────────────────────────────────────────
# OUTPUTS — informacao util apos o deploy
# ─────────────────────────────────────────────
Outputs:

  WebsiteURL:
    Description: URL do website via S3
    Value: !GetAtt WebsiteBucket.WebsiteURL
    Export:
      Name: !Sub "${ProjectName}-WebsiteURL"

  BucketName:
    Description: Nome do bucket S3
    Value: !Ref WebsiteBucket
    Export:
      Name: !Sub "${ProjectName}-BucketName"

  HostedZoneId:
    Description: ID da Hosted Zone no Route 53
    Value: !Ref HostedZone
    Export:
      Name: !Sub "${ProjectName}-HostedZoneId"

  AlarmTopicARN:
    Description: ARN do topico SNS para alertas
    Value: !Ref AlarmTopic
    Export:
      Name: !Sub "${ProjectName}-AlarmTopicARN"
